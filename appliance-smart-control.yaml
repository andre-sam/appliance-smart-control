blueprint:
  name: Appliance Smart Control (LG ThinQ)
  description: >
    Pauses a long-running appliance (dishwasher, washing machine, tumble
    dryer, ...) whenever live solar production drops below a threshold,
    and resumes it when production returns. Same rule handles both
    "started too early in the morning" and "running into the evening".


    Designed around LG ThinQ entities (`sensor.*_current_status`,
    `select.*_operation`, `switch.*_power`) but works with anything
    that exposes equivalent entities.


    Logic:
      • If the appliance is RUNNING and live production has been BELOW
        `production_threshold` for `dwell_minutes`, pause it and flag
        that WE paused it.
      • If the appliance is PAUSED (by us) and live production has been
        ABOVE `production_threshold` for `dwell_minutes`, resume it.
      • If the user manually resumes or the cycle ends, clear the flag.


    Pause action is configurable per appliance:
      • `select_option`: call `select.select_option` on
        `select.*_operation` (LG washer/dryer — `stop` to pause,
        `start` to resume).
      • `switch_off`: turn off a power switch (DRYER ONLY, and most
        appliances will NOT auto-resume after a cold power cycle).
      • `notify_only`: send a notification, do nothing else
        (LG dishwasher which is read-only in HA).


    Required helpers (per appliance):
      • input_boolean.<appliance>_paused_by_solar
        — flag the blueprint sets when IT paused the appliance, so it
        only resumes things it paused itself.

  domain: automation
  source_url: https://github.com/andre-sam/appliance-smart-control/blob/main/appliance-smart-control.yaml

  input:
    enable_toggle:
      name: Master enable toggle
      description: input_boolean to enable/disable this automation.
      selector:
        entity:
          domain: input_boolean

    # ---------- Appliance state ----------
    status_sensor:
      name: Appliance status sensor
      description: >
        Sensor reporting the appliance's current operating state, e.g.
        `sensor.washer_current_status`.
      selector:
        entity:
          domain: sensor

    running_states:
      name: "Status values that mean RUNNING"
      description: >
        Comma-separated list of `status_sensor` states treated as
        "currently running" (eligible to pause).
      default: "running,detecting,rinsing,spinning,drying,cooling,cool_down,wrinkle_care,refreshing,night_dry,rinse_hold"
      selector:
        text:

    paused_states:
      name: "Status values that mean PAUSED"
      description: >
        Comma-separated list of `status_sensor` states treated as
        "currently paused" (eligible to resume).
      default: "pause,paused"
      selector:
        text:

    remaining_time_sensor:
      name: "Remaining cycle time sensor (optional)"
      description: >
        Sensor reporting time left in the current cycle, e.g.
        `sensor.washer_remaining_time`. Used to skip the pause when
        the cycle is nearly done. Accepts numeric minutes or
        `HH:MM[:SS]`. Leave blank to disable the "almost finished"
        check.
      default: ""
      selector:
        entity:
          domain: sensor

    min_remaining_minutes:
      name: Don't bother pausing if less than this remaining (min)
      description: >
        If `remaining_time_sensor` is configured and reports less than
        this many minutes left, just let the cycle finish.
      default: 10
      selector:
        number:
          min: 0
          max: 240
          unit_of_measurement: min
          mode: box

    # ---------- Solar ----------
    production_sensor:
      name: Live solar production sensor (W)
      description: >
        Sensor reporting current solar production in watts, e.g.
        `sensor.power_production_now`.
      selector:
        entity:
          domain: sensor
          device_class: power

    production_threshold:
      name: Production threshold (W)
      description: >
        Pause when production drops BELOW this. Resume when it
        rises ABOVE this.
      default: 1000
      selector:
        number:
          min: 0
          max: 10000
          step: 50
          unit_of_measurement: W
          mode: box

    dwell_minutes:
      name: Dwell minutes
      description: >
        Production must stay below/above the threshold for this long
        before pausing/resuming. Avoids flapping on passing clouds.
      default: 5
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: min
          mode: box

    # ---------- Pause action ----------
    pause_mode:
      name: How to pause this appliance
      description: >
        - `select_option`: call `select.select_option` on the
          configured operation select (LG washer/dryer).
        - `switch_off`: turn off a power switch (DRYER ONLY, and
          program is usually lost after a cold power cycle).
        - `notify_only`: send a notification, take no action
          (LG dishwasher, read-only in HA).
      default: notify_only
      selector:
        select:
          options:
            - select_option
            - switch_off
            - notify_only

    operation_select:
      name: "Operation select entity (for `select_option` mode)"
      description: >
        e.g. `select.washer_operation` / `select.dryer_operation`.
      default: ""
      selector:
        entity:
          domain: select

    pause_option:
      name: "Option to send to pause"
      description: >
        Value passed to `select.select_option`. For LG ThinQ
        washer/dryer this is `stop` (do NOT use `power_off` —
        that ends the cycle).
      default: "stop"
      selector:
        text:

    resume_option:
      name: "Option to send to resume"
      description: >
        Value passed to `select.select_option`. For LG ThinQ
        washer/dryer this is `start`.
      default: "start"
      selector:
        text:

    power_switch:
      name: "Power switch (for `switch_off` mode)"
      description: >
        e.g. `switch.dryer_power`. Ignored unless `pause_mode` is
        `switch_off`.
      default: ""
      selector:
        entity:
          domain: switch

    paused_flag:
      name: "Paused-by-solar flag (input_boolean)"
      description: >
        Per-appliance input_boolean flipped ON when the blueprint
        pauses the appliance, OFF after a successful resume. Used
        so the blueprint never resumes something the user paused
        themselves.
      selector:
        entity:
          domain: input_boolean

    remote_start_sensor:
      name: "Remote-start armed sensor (optional)"
      description: >
        Some LG ThinQ appliances require Remote Start to be armed at
        the panel before the API will accept commands, e.g.
        `binary_sensor.dryer_remote_start`. If provided and OFF, the
        blueprint will NOT send pause/resume commands. Leave blank to
        skip this gate.
      default: ""
      selector:
        entity:
          domain: binary_sensor

    # ---------- Notification ----------
    notify_service:
      name: Notification service (optional)
      description: >
        e.g. `notify.mobile_app_pixel`. Leave blank to disable
        notifications. Required if `pause_mode` is `notify_only`.
      default: ""
      selector:
        text:

    appliance_friendly_name:
      name: Appliance friendly name
      description: Used in notification text, e.g. "Washer".
      default: "Appliance"
      selector:
        text:

mode: single
max_exceeded: silent

trigger:
  # Periodic safety net for dwell timing.
  - platform: time_pattern
    minutes: "/1"
    id: tick
  # React immediately to appliance status changes.
  - platform: state
    entity_id: !input status_sensor
    id: status_change
  # React when production crosses the threshold (with dwell built in).
  - platform: numeric_state
    entity_id: !input production_sensor
    below: !input production_threshold
    for:
      minutes: !input dwell_minutes
    id: production_low
  - platform: numeric_state
    entity_id: !input production_sensor
    above: !input production_threshold
    for:
      minutes: !input dwell_minutes
    id: production_high

variables:
  enable_toggle: !input enable_toggle
  status_sensor: !input status_sensor
  running_states: !input running_states
  paused_states: !input paused_states
  remaining_time_sensor: !input remaining_time_sensor
  min_remaining_minutes: !input min_remaining_minutes

  production_sensor: !input production_sensor
  production_threshold: !input production_threshold
  dwell_minutes: !input dwell_minutes

  pause_mode: !input pause_mode
  operation_select: !input operation_select
  pause_option: !input pause_option
  resume_option: !input resume_option
  power_switch: !input power_switch
  paused_flag: !input paused_flag
  remote_start_sensor: !input remote_start_sensor

  notify_service: !input notify_service
  appliance_friendly_name: !input appliance_friendly_name

  # --- "is this entity configured?" checks ---
  has_remaining:    "{{ (remaining_time_sensor | string | length) > 0 }}"
  has_op_select:    "{{ (operation_select      | string | length) > 0 }}"
  has_power_switch: "{{ (power_switch          | string | length) > 0 }}"
  has_remote_start: "{{ (remote_start_sensor   | string | length) > 0 }}"
  has_notify:       "{{ (notify_service        | string | length) > 0 }}"

  # --- status ---
  status_raw: "{{ states(status_sensor) | lower }}"
  running_list: "{{ running_states.split(',') | map('trim') | map('lower') | list }}"
  paused_list:  "{{ paused_states.split(',')  | map('trim') | map('lower') | list }}"
  is_running: "{{ status_raw in running_list }}"
  is_paused:  "{{ status_raw in paused_list }}"

  # --- remaining minutes (only used if a remaining sensor is configured) ---
  remaining_raw: "{{ states(remaining_time_sensor) if has_remaining else '0' }}"
  remaining_minutes: >
    {% set v = remaining_raw %}
    {% if v in ['unknown','unavailable','none',''] or v is none %}
      {{ 9999 }}
    {% elif ':' in v %}
      {% set parts = v.split(':') | map('int', 0) | list %}
      {% if parts|length == 3 %}
        {{ (parts[0]*60 + parts[1] + (parts[2] / 60)) | round(0) | int }}
      {% elif parts|length == 2 %}
        {{ (parts[0]*60 + parts[1]) | int }}
      {% else %}
        {{ 9999 }}
      {% endif %}
    {% else %}
      {{ v | float(0) | round(0) | int }}
    {% endif %}
  remaining_ok_to_pause: "{{ (not has_remaining) or (remaining_minutes > min_remaining_minutes) }}"

  # --- production ---
  production_w: "{{ states(production_sensor) | float(0) }}"
  production_low_now:  "{{ production_w <  production_threshold }}"
  production_high_now: "{{ production_w >= production_threshold }}"

  # --- remote start gate ---
  remote_start_ok: "{{ (not has_remote_start) or is_state(remote_start_sensor, 'on') }}"

  # --- flag ---
  paused_by_us: "{{ is_state(paused_flag, 'on') }}"

condition:
  - condition: state
    entity_id: !input enable_toggle
    state: "on"

action:
  - choose:

      # ---------- PAUSE ----------
      - conditions:
          - "{{ is_running }}"
          - "{{ production_low_now }}"
          - "{{ remaining_ok_to_pause }}"
          - "{{ not paused_by_us }}"
          # For commanded modes the appliance must be reachable.
          - "{{ pause_mode == 'notify_only' or remote_start_ok }}"
        sequence:
          # Only flip the "we paused this" flag when we actually act.
          - choose:
              - conditions: "{{ pause_mode != 'notify_only' }}"
                sequence:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: !input paused_flag
          - choose:
              - conditions: "{{ pause_mode == 'select_option' and has_op_select }}"
                sequence:
                  - service: select.select_option
                    target:
                      entity_id: "{{ operation_select }}"
                    data:
                      option: "{{ pause_option }}"
              - conditions: "{{ pause_mode == 'switch_off' and has_power_switch }}"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: "{{ power_switch }}"
          - choose:
              - conditions: "{{ has_notify }}"
                sequence:
                  - service: "{{ notify_service }}"
                    data:
                      title: "Solar pause"
                      message: >
                        {% if pause_mode == 'notify_only' -%}
                        Consider pausing {{ appliance_friendly_name }} —
                        {%- else -%}
                        Paused {{ appliance_friendly_name }} —
                        {%- endif %}
                        production {{ production_w | int }} W
                        (< {{ production_threshold | int }} W).
                        Will resume when production returns.

      # ---------- RESUME ----------
      - conditions:
          - "{{ paused_by_us }}"
          - "{{ is_paused }}"
          - "{{ production_high_now }}"
          - "{{ remote_start_ok }}"
        sequence:
          - choose:
              - conditions: "{{ pause_mode == 'select_option' and has_op_select }}"
                sequence:
                  - service: select.select_option
                    target:
                      entity_id: "{{ operation_select }}"
                    data:
                      option: "{{ resume_option }}"
              - conditions: "{{ pause_mode == 'switch_off' and has_power_switch }}"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: "{{ power_switch }}"
          - service: input_boolean.turn_off
            target:
              entity_id: !input paused_flag
          - choose:
              - conditions: "{{ has_notify }}"
                sequence:
                  - service: "{{ notify_service }}"
                    data:
                      title: "Solar resume"
                      message: >
                        Resumed {{ appliance_friendly_name }}
                        (production {{ production_w | int }} W).

      # ---------- CLEAR FLAG (user manually resumed / cycle ended) ----------
      - conditions:
          - "{{ paused_by_us }}"
          - "{{ not is_paused }}"
          - "{{ not is_running }}"
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: !input paused_flag
