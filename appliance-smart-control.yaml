blueprint:
  name: Appliance Smart Control (LG ThinQ)
  description: >
    Pauses a long-running appliance (dishwasher, washing machine, tumble
    dryer, ...) shortly before sunset when household solar export drops
    below a threshold, so the remaining cycle runs the next day on free
    solar instead of grid power.


    Designed around LG ThinQ entities (`sensor.*_current_status`,
    `select.*_operation`, `switch.*_power`, `sensor.*_remaining_time`)
    but works with anything that exposes equivalent entities.


    Logic (evaluated every minute):
      • If the appliance is running AND now is within `lead_minutes`
        of sunset AND grid export < `export_threshold` (sustained for
        `pause_dwell` minutes) AND remaining cycle time is in
        [`min_remaining_minutes`, `max_remaining_minutes`], pause it
        and remember that WE paused it.
      • Smarter "should we even bother?" gates (all optional):
          - skip pause if remaining solar forecast today covers the
            rest of the cycle
          - skip pause if tomorrow's forecast is poor (no point
            deferring to a cloudy day)
          - skip pause if grid is currently cheap
          - skip pause if home battery has headroom (future-proof)
      • The next day, optionally auto-resume:
          - `auto_export`  : when export ≥ threshold again (sustained)
          - `fixed_time`   : at a configured time
          - `manual`       : only notify, you press resume yourself
        Auto-resume never fires before `earliest_resume_hour`.
      • Pause action is configurable per appliance:
          - `select_option`: call select.select_option on
            `select.*_operation` with the configured value (LG dryer/washer)
          - `switch_off`   : turn off a power switch (DRYER ONLY — and
            note that most appliances will NOT resume the program after
            a cold power cycle; treat this as "abort, restart manually")
          - `notify_only`  : send a notification, do nothing else
            (use for the LG dishwasher which is read-only in HA)


    Instantiate once per appliance.


    Required helpers (create per appliance):
      • input_boolean.<appliance>_paused_by_solar
        — flag the blueprint sets when IT paused the appliance, so it
        only resumes things it paused itself.

    Optional helpers (per appliance — improve robustness if provided):
      • input_datetime.<appliance>_pause_timestamp  (date+time)
        — exact moment of last pause; used for resume dwell/min-wait.
      • input_datetime.<appliance>_low_export_since (date+time)
        — first moment export went below threshold; used for pause dwell.
      • input_datetime.<appliance>_last_resume      (date+time)
        — date of last auto-resume; used to avoid double-resume.

  domain: automation
  source_url: https://github.com/andre-sam/appliance-smart-control/blob/main/appliance-smart-control.yaml

  input:
    enable_toggle:
      name: Master enable toggle
      description: input_boolean to enable/disable this automation.
      selector:
        entity:
          domain: input_boolean

    # ---------- Appliance state ----------
    status_sensor:
      name: Appliance status sensor
      description: >
        Sensor reporting the appliance's current operating state, e.g.
        `sensor.dishwasher_current_status`. Expected states like
        `running`, `pause`, `power_off`, `end`, `delayed_start`.
      selector:
        entity:
          domain: sensor

    running_states:
      name: "Status values that mean RUNNING"
      description: >
        Comma-separated list of `status_sensor` states that should be
        treated as "currently running" (and therefore eligible to pause).
        LG ThinQ default covers dishwasher / washer / dryer cycle phases.
      default: "running,detecting,rinsing,spinning,drying,cooling,cool_down,wrinkle_care,refreshing,night_dry,rinse_hold"
      selector:
        text:

    paused_states:
      name: "Status values that mean PAUSED"
      description: >
        Comma-separated list of `status_sensor` states that should be
        treated as "currently paused" (eligible to auto-resume).
      default: "pause,paused"
      selector:
        text:

    remaining_time_sensor:
      name: Remaining cycle time sensor
      description: >
        Sensor reporting time left in the current cycle, e.g.
        `sensor.dishwasher_remaining_time`. Used to skip the pause if
        the cycle is almost finished. Accepts states formatted as
        minutes (number) or `HH:MM:SS` / `HH:MM`.
      selector:
        entity:
          domain: sensor

    min_remaining_minutes:
      name: Minimum remaining minutes to bother pausing
      description: >
        If less than this many minutes are left in the cycle, just let
        it finish on grid power instead of pausing.
      default: 15
      selector:
        number:
          min: 0
          max: 240
          unit_of_measurement: min
          mode: box

    max_remaining_minutes:
      name: Maximum remaining minutes to bother pausing
      description: >
        If more than this many minutes are left, the cycle has likely
        only just started — don't bother pausing (it'd be a long pause
        and you may have meant `delayed_start`). Set high (e.g. 999) to
        disable this gate.
      default: 240
      selector:
        number:
          min: 30
          max: 999
          unit_of_measurement: min
          mode: box

    appliance_power_w:
      name: Appliance nominal power draw (W)
      description: >
        Approximate power consumption while running. Used in
        notifications to estimate energy saved, and (if a solar
        forecast is configured) to decide if remaining solar covers
        the rest of the cycle.
      default: 2000
      selector:
        number:
          min: 0
          max: 5000
          step: 50
          unit_of_measurement: W
          mode: box

    # ---------- Pause action ----------
    pause_mode:
      name: How to pause this appliance
      description: >
        - `select_option`: calls `select.select_option` on the configured
          operation select (LG dryer & washer).
        - `switch_off`: turns off a power switch — DRYER ONLY, and most
          appliances will NOT auto-resume after a cold power cycle.
        - `notify_only`: sends a notification, takes no action (LG
          dishwasher which has no controllable entities in HA).
      default: notify_only
      selector:
        select:
          options:
            - select_option
            - switch_off
            - notify_only

    operation_select:
      name: "Operation select entity (for `select_option` mode)"
      description: >
        e.g. `select.dryer_operation` / `select.washer_operation`.
        Ignored unless `pause_mode` is `select_option`.
      default:
      selector:
        entity:
          domain: select

    pause_option:
      name: "Option to send to pause (for `select_option` mode)"
      description: >
        Value passed to `select.select_option`. For LG ThinQ washer/dryer
        the available options are `start`, `stop`, `power_off`, `wake_up` —
        use `stop` to pause (`power_off` would END the cycle).
      default: "stop"
      selector:
        text:

    resume_option:
      name: "Option to send to resume (for `select_option` mode)"
      description: >
        Value passed to `select.select_option` when auto-resuming.
        For LG ThinQ washer/dryer this is `start` (or `wake_up` if the
        unit has gone to sleep).
      default: "start"
      selector:
        text:

    power_switch:
      name: "Power switch (for `switch_off` mode — DRYER ONLY)"
      description: >
        e.g. `switch.dryer_power`. Ignored unless `pause_mode` is
        `switch_off`. Do NOT use this for washers or dishwashers, and
        be aware that turning power back on does NOT resume the
        program on most appliances — the user will need to restart it.
      default:
      selector:
        entity:
          domain: switch

    paused_flag:
      name: "Paused-by-solar flag (input_boolean)"
      description: >
        Per-appliance input_boolean the blueprint flips ON when it
        pauses the appliance, and OFF after a successful resume. Lets
        the blueprint distinguish "I paused this" from "the user
        paused this manually". NOTE: in `notify_only` mode the flag
        stays OFF (we didn't actually do anything to pause it).
      selector:
        entity:
          domain: input_boolean

    pause_timestamp:
      name: "Pause timestamp helper (input_datetime, optional)"
      description: >
        Optional input_datetime (with date AND time) where the
        blueprint records when it paused the appliance. Survives HA
        restarts and is more reliable than `last_changed`. Leave blank
        to fall back to the paused-flag's `last_changed`.
      default: ""
      selector:
        entity:
          domain: input_datetime

    # ---------- Solar / sunset ----------
    export_sensor:
      name: Grid export power sensor
      description: >
        Power flowing to the grid. Either signed (negative when
        exporting) or positive-when-exporting — toggle below.
      selector:
        entity:
          domain: sensor
          device_class: power

    positive_when_exporting:
      name: Export sensor is positive when exporting
      description: >
        ON: sensor reads positive watts while exporting (e.g.
        a dedicated export sensor). OFF: sensor is signed and reads
        negative when exporting (typical net grid sensor).
      default: false
      selector:
        boolean:

    export_threshold:
      name: Export threshold (W)
      description: >
        If grid export is BELOW this value as sunset approaches, the
        appliance gets paused (after `pause_dwell`).
      default: 300
      selector:
        number:
          min: 0
          max: 5000
          step: 50
          unit_of_measurement: W
          mode: box

    pause_dwell:
      name: Pause dwell (minutes)
      description: >
        Export must stay below the threshold this long before pausing,
        to avoid pausing on a passing cloud. Requires the optional
        `low_export_since` helper to be configured; otherwise this is
        treated as 0.
      default: 5
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: min
          mode: box

    low_export_since:
      name: "Low-export timestamp helper (input_datetime, optional)"
      description: >
        Optional input_datetime (with date AND time) where the
        blueprint records the first moment export went below the
        threshold. Used to enforce `pause_dwell`. Leave blank to
        disable dwell.
      default: ""
      selector:
        entity:
          domain: input_datetime

    lead_minutes:
      name: Pause lead time before sunset (minutes)
      description: >
        How many minutes before sunset the pause window opens.
      default: 60
      selector:
        number:
          min: 0
          max: 240
          unit_of_measurement: min
          mode: box

    pause_window_end_offset:
      name: Pause window end offset (minutes after sunset)
      description: >
        How many minutes after sunset the pause window stays open.
        Set to 0 to close the window exactly at sunset.
      default: 5
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: min
          mode: box

    # ---------- Smarter gating (all optional) ----------
    solar_forecast_remaining_sensor:
      name: "Remaining solar today (sensor, optional)"
      description: >
        Sensor reporting kWh of solar still expected today (e.g.
        Forecast.Solar / Solcast `energy_production_today_remaining`).
        If provided, the pause is SKIPPED when remaining solar is
        enough to finish the cycle on the spot.
      default: ""
      selector:
        entity:
          domain: sensor

    tomorrow_forecast_sensor:
      name: "Tomorrow's solar forecast (sensor, optional)"
      description: >
        Sensor reporting expected kWh of solar tomorrow. If provided
        and tomorrow's forecast is below `min_tomorrow_kwh`, the
        pause is SKIPPED (no point deferring to a cloudy day).
      default: ""
      selector:
        entity:
          domain: sensor

    min_tomorrow_kwh:
      name: Minimum tomorrow forecast (kWh) to allow pausing
      description: >
        Used only when `tomorrow_forecast_sensor` is set.
      default: 5
      selector:
        number:
          min: 0
          max: 100
          step: 0.5
          unit_of_measurement: kWh
          mode: box

    tariff_sensor:
      name: "Current grid price sensor (optional)"
      description: >
        Sensor reporting current grid import price (any unit). If
        provided and the value is below `cheap_grid_threshold`, the
        pause is SKIPPED (cheap grid beats waiting).
      default: ""
      selector:
        entity:
          domain: sensor

    cheap_grid_threshold:
      name: Cheap-grid threshold
      description: >
        If `tariff_sensor` < this, skip pause. Units must match the
        tariff sensor (e.g. p/kWh or €/kWh).
      default: 0
      selector:
        number:
          min: -100
          max: 100
          step: 0.01
          mode: box

    battery_soc_sensor:
      name: "Home battery SOC sensor (optional, future-proof)"
      description: >
        Battery state-of-charge in %. If provided and SOC is at or
        above `battery_min_soc`, the pause is SKIPPED — the battery
        will cover the appliance from stored solar.
      default: ""
      selector:
        entity:
          domain: sensor

    battery_min_soc:
      name: Minimum battery SOC to skip pause (%)
      description: >
        Used only when `battery_soc_sensor` is set.
      default: 80
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: box

    # ---------- Resume ----------
    resume_strategy:
      name: Resume strategy
      description: >
        - `auto_export`: auto-resume the next day once grid export is
          back above the threshold for `resume_dwell` minutes.
        - `fixed_time`: auto-resume at `resume_time` the next day.
        - `manual`: only notify; you press resume yourself.
      default: manual
      selector:
        select:
          options:
            - auto_export
            - fixed_time
            - manual

    resume_dwell:
      name: "Resume dwell (minutes, for `auto_export` mode)"
      description: >
        Export must stay above the threshold this long before resuming,
        to avoid flapping on a passing cloud.
      default: 10
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: min
          mode: box

    resume_time:
      name: "Earliest resume time (input_datetime, for `fixed_time` mode)"
      description: >
        Time-of-day input_datetime; the appliance is resumed at or after
        this time on the day after it was paused.
      default: ""
      selector:
        entity:
          domain: input_datetime

    earliest_resume_hour:
      name: Earliest auto-resume hour (24h)
      description: >
        Auto-resume (any strategy) is suppressed before this hour, so
        a stray sensor spike at 04:00 won't restart the appliance.
      default: 8
      selector:
        number:
          min: 0
          max: 23
          unit_of_measurement: h
          mode: box

    min_pause_hours:
      name: Minimum pause duration (hours)
      description: >
        After pausing, wait at least this long before any auto-resume.
        Prevents an immediate "resume" if export bounces back briefly.
      default: 4
      selector:
        number:
          min: 0
          max: 24
          step: 0.5
          unit_of_measurement: h
          mode: box

    last_resume_date:
      name: "Last-resume datetime helper (input_datetime, optional)"
      description: >
        Optional input_datetime (date AND time). Set when an
        auto-resume fires; used to suppress a second auto-resume on
        the same day. Leave blank to skip this guard.
      default: ""
      selector:
        entity:
          domain: input_datetime

    # ---------- Keepalive (LG auto-power-off workaround) ----------
    keepalive_enabled:
      name: "Keepalive: defer the appliance's auto-power-off"
      description: >
        LG ThinQ washers/dryers typically auto-power-off after ~4 hours
        in pause, which would lose the cycle before tomorrow's solar
        arrives. When enabled, this periodically sends a benign
        "wake" command to the operation select to reset the timeout
        countdown. ONLY use with `pause_mode: select_option`. Has no
        effect for `notify_only` or `switch_off`.
      default: false
      selector:
        boolean:

    keepalive_option:
      name: "Keepalive option (sent to operation select)"
      description: >
        Value sent to `select.select_option` to defer auto-power-off.
        For LG ThinQ this should be `wake_up` — it lights the display
        without affecting the paused program. NEVER set this to
        `start` (would resume the cycle immediately) or `power_off`
        (would end it).
      default: "wake_up"
      selector:
        text:

    keepalive_interval_hours:
      name: Keepalive interval (hours)
      description: >
        How often to send the keepalive command while paused. Must be
        SHORTER than your appliance's auto-power-off timeout
        (LG ThinQ ~4 h). Default 3 h leaves ~1 h safety margin.
      default: 3
      selector:
        number:
          min: 1
          max: 6
          step: 0.5
          unit_of_measurement: h
          mode: box

    last_keepalive:
      name: "Last-keepalive timestamp (input_datetime, optional)"
      description: >
        Optional input_datetime (date AND time) where the blueprint
        records when it last sent a keepalive. REQUIRED if
        `keepalive_enabled` is true — without it the blueprint can't
        space the taps out and would spam them every tick.
      default: ""
      selector:
        entity:
          domain: input_datetime

    timeout_states:
      name: "Status values that mean APPLIANCE TIMED OUT / CYCLE LOST"
      description: >
        Comma-separated `status_sensor` states that indicate the
        appliance powered itself off or otherwise dropped the
        program while we had it paused. If one of these is seen
        while `paused_by_solar` is on, the user is notified that the
        cycle was lost and the flag is cleared.
      default: "power_off,off,end,initial"
      selector:
        text:

    # ---------- Notification ----------
    notify_service:
      name: Notification service (optional)
      description: >
        e.g. `notify.mobile_app_pixel`. Leave blank to disable
        notifications. Required if `pause_mode` is `notify_only`.
      default: ""
      selector:
        text:

    appliance_friendly_name:
      name: Appliance friendly name
      description: Used in notification text, e.g. "Dishwasher".
      default: "Appliance"
      selector:
        text:

mode: single
max_exceeded: silent

trigger:
  # Periodic safety net — handles time-of-day crossings (sunset proximity,
  # fixed_time resume) and dwell timers without needing per-helper logic.
  # 5 min is plenty: sunset shifts <1 min/day and pause timing is coarse.
  - platform: time_pattern
    minutes: "/5"
    id: tick
  # React immediately when the appliance starts/stops/pauses.
  - platform: state
    entity_id: !input status_sensor
    id: status_change
  # React immediately when grid export changes meaningfully — no need to
  # wait up to 5 min for the next tick to notice a big swing.
  - platform: state
    entity_id: !input export_sensor
    id: export_change
  # Guarantee an evaluation right at sunset, independent of tick alignment.
  - platform: sun
    event: sunset
    id: sunset

variables:
  enable_toggle: !input enable_toggle
  status_sensor: !input status_sensor
  running_states: !input running_states
  paused_states: !input paused_states
  remaining_time_sensor: !input remaining_time_sensor
  min_remaining_minutes: !input min_remaining_minutes
  max_remaining_minutes: !input max_remaining_minutes
  appliance_power_w: !input appliance_power_w

  pause_mode: !input pause_mode
  operation_select: !input operation_select
  pause_option: !input pause_option
  resume_option: !input resume_option
  power_switch: !input power_switch
  paused_flag: !input paused_flag
  pause_timestamp: !input pause_timestamp

  export_sensor: !input export_sensor
  positive_when_exporting: !input positive_when_exporting
  export_threshold: !input export_threshold
  pause_dwell: !input pause_dwell
  low_export_since: !input low_export_since
  lead_minutes: !input lead_minutes
  pause_window_end_offset: !input pause_window_end_offset

  solar_forecast_remaining_sensor: !input solar_forecast_remaining_sensor
  tomorrow_forecast_sensor: !input tomorrow_forecast_sensor
  min_tomorrow_kwh: !input min_tomorrow_kwh
  tariff_sensor: !input tariff_sensor
  cheap_grid_threshold: !input cheap_grid_threshold
  battery_soc_sensor: !input battery_soc_sensor
  battery_min_soc: !input battery_min_soc

  resume_strategy: !input resume_strategy
  resume_dwell: !input resume_dwell
  resume_time: !input resume_time
  earliest_resume_hour: !input earliest_resume_hour
  min_pause_hours: !input min_pause_hours
  last_resume_date: !input last_resume_date

  keepalive_enabled: !input keepalive_enabled
  keepalive_option: !input keepalive_option
  keepalive_interval_hours: !input keepalive_interval_hours
  last_keepalive: !input last_keepalive
  timeout_states: !input timeout_states

  notify_service: !input notify_service
  appliance_friendly_name: !input appliance_friendly_name

  # --- helpers: safe "is this entity configured?" checks ---
  has_pause_ts:        "{{ (pause_timestamp        | string | length) > 0 }}"
  has_low_export_ts:   "{{ (low_export_since       | string | length) > 0 }}"
  has_last_resume:     "{{ (last_resume_date       | string | length) > 0 }}"
  has_op_select:       "{{ (operation_select       | string | length) > 0 }}"
  has_power_switch:    "{{ (power_switch           | string | length) > 0 }}"
  has_resume_time:     "{{ (resume_time            | string | length) > 0 }}"
  has_solar_remaining: "{{ (solar_forecast_remaining_sensor | string | length) > 0 }}"
  has_tomorrow_fc:     "{{ (tomorrow_forecast_sensor | string | length) > 0 }}"
  has_tariff:          "{{ (tariff_sensor          | string | length) > 0 }}"
  has_battery:         "{{ (battery_soc_sensor     | string | length) > 0 }}"
  has_notify:          "{{ (notify_service         | string | length) > 0 }}"
  has_last_keepalive:  "{{ (last_keepalive         | string | length) > 0 }}"

  # --- derived: status ---
  status_raw: "{{ states(status_sensor) | lower }}"
  running_list: >
    {{ running_states.split(',') | map('trim') | map('lower') | list }}
  paused_list: >
    {{ paused_states.split(',') | map('trim') | map('lower') | list }}
  timeout_list: >
    {{ timeout_states.split(',') | map('trim') | map('lower') | list }}
  is_running: "{{ status_raw in running_list }}"
  is_paused: "{{ status_raw in paused_list }}"
  is_timed_out: "{{ status_raw in timeout_list }}"

  # remaining minutes — accepts numeric minutes or HH:MM[:SS]
  remaining_raw: "{{ states(remaining_time_sensor) }}"
  remaining_minutes: >
    {% set v = remaining_raw %}
    {% if v in ['unknown','unavailable','none',''] or v is none %}
      {{ 0 }}
    {% elif ':' in v %}
      {% set parts = v.split(':') | map('int', 0) | list %}
      {% if parts|length == 3 %}
        {{ (parts[0]*60 + parts[1] + (parts[2] / 60)) | round(0) | int }}
      {% elif parts|length == 2 %}
        {{ (parts[0]*60 + parts[1]) | int }}
      {% else %}
        {{ 0 }}
      {% endif %}
    {% else %}
      {{ v | float(0) | round(0) | int }}
    {% endif %}

  # export power normalised so positive = exporting
  export_raw: "{{ states(export_sensor) | float(0) }}"
  export_w: >
    {{ (export_raw if positive_when_exporting else (-export_raw)) | float(0) }}

  # sunset window
  next_setting: "{{ state_attr('sun.sun', 'next_setting') }}"
  minutes_to_sunset: >
    {% if next_setting %}
      {{ ((as_timestamp(next_setting) - as_timestamp(now())) / 60) | round(0) | int }}
    {% else %}
      {{ 9999 }}
    {% endif %}
  in_pause_window: >
    {{ minutes_to_sunset <= lead_minutes
       and minutes_to_sunset >= (-1 * pause_window_end_offset) }}

  paused_by_us: "{{ is_state(paused_flag, 'on') }}"

  # --- pause-time reference (explicit helper preferred, fallback to last_changed) ---
  pause_ref_ts: >
    {% if has_pause_ts %}
      {% set ts = states(pause_timestamp) %}
      {% if ts in ['unknown','unavailable','none',''] or ts is none %}
        0
      {% else %}
        {{ as_timestamp(ts) | float(0) }}
      {% endif %}
    {% else %}
      {{ as_timestamp(states[paused_flag.split('.')[1]].last_changed
         if states[paused_flag.split('.')[1]] is defined else now()) | float(0) }}
    {% endif %}
  hours_since_pause: >
    {% if pause_ref_ts and pause_ref_ts > 0 %}
      {{ ((as_timestamp(now()) - pause_ref_ts) / 3600) | float(0) }}
    {% else %}
      {{ 9999 }}
    {% endif %}
  minutes_since_low_export: >
    {% if has_low_export_ts %}
      {% set ts = states(low_export_since) %}
      {% if ts in ['unknown','unavailable','none',''] or ts is none %}
        0
      {% else %}
        {{ ((as_timestamp(now()) - as_timestamp(ts)) / 60) | float(0) }}
      {% endif %}
    {% else %}
      {{ 9999 }}
    {% endif %}

  # --- keepalive timing ---
  hours_since_keepalive: >
    {% if has_last_keepalive %}
      {% set ts = states(last_keepalive) %}
      {% if ts in ['unknown','unavailable','none',''] or ts is none %}
        9999
      {% else %}
        {{ ((as_timestamp(now()) - as_timestamp(ts)) / 3600) | float(0) }}
      {% endif %}
    {% else %}
      {{ 9999 }}
    {% endif %}
  keepalive_due: >
    {{ keepalive_enabled
       and pause_mode == 'select_option'
       and has_op_select
       and has_last_keepalive
       and hours_since_keepalive >= (keepalive_interval_hours | float(3))
       and now().hour < (earliest_resume_hour | int(8)) }}

  # --- already-resumed-today guard ---
  resumed_today: >
    {% if has_last_resume %}
      {% set ts = states(last_resume_date) %}
      {% if ts in ['unknown','unavailable','none',''] or ts is none %}
        false
      {% else %}
        {{ (as_timestamp(ts) | timestamp_custom('%Y-%m-%d', true))
           == now().strftime('%Y-%m-%d') }}
      {% endif %}
    {% else %}
      false
    {% endif %}

  # --- "smarter" skip-pause gates ---
  solar_remaining_kwh: >
    {% if has_solar_remaining %}{{ states(solar_forecast_remaining_sensor) | float(0) }}{% else %}0{% endif %}
  cycle_energy_kwh: >
    {{ ((appliance_power_w | float(0)) * (remaining_minutes | float(0)) / 60.0 / 1000.0) | float(0) }}
  solar_covers_cycle: >
    {{ has_solar_remaining and solar_remaining_kwh >= cycle_energy_kwh and cycle_energy_kwh > 0 }}

  tomorrow_kwh: >
    {% if has_tomorrow_fc %}{{ states(tomorrow_forecast_sensor) | float(0) }}{% else %}9999{% endif %}
  tomorrow_too_poor: "{{ has_tomorrow_fc and tomorrow_kwh < min_tomorrow_kwh }}"

  tariff_now: >
    {% if has_tariff %}{{ states(tariff_sensor) | float(99999) }}{% else %}99999{% endif %}
  grid_is_cheap: "{{ has_tariff and tariff_now < cheap_grid_threshold }}"

  battery_soc_now: >
    {% if has_battery %}{{ states(battery_soc_sensor) | float(0) }}{% else %}0{% endif %}
  battery_has_headroom: "{{ has_battery and battery_soc_now >= battery_min_soc }}"

  skip_pause: >
    {{ solar_covers_cycle or tomorrow_too_poor or grid_is_cheap or battery_has_headroom }}

  # --- pause-dwell satisfied ---
  pause_dwell_ok: >
    {{ (pause_dwell | int(0)) == 0
       or (has_low_export_ts and minutes_since_low_export >= (pause_dwell | int(0))) }}

  # --- resume time-of-day OK ---
  past_earliest_resume_hour: "{{ now().hour >= (earliest_resume_hour | int(8)) }}"
  past_min_pause: "{{ hours_since_pause >= (min_pause_hours | float(4)) }}"

condition:
  - condition: state
    entity_id: !input enable_toggle
    state: "on"

action:
  - choose:

      # ---------- Track low-export timestamp (for pause_dwell) ----------
      # Set when export drops below threshold and we don't already have a stamp.
      - conditions:
          - "{{ has_low_export_ts }}"
          - "{{ is_running }}"
          - "{{ export_w < export_threshold }}"
          - >
            {% set ts = states(low_export_since) %}
            {{ ts in ['unknown','unavailable','none',''] or ts is none
               or (as_timestamp(now()) - as_timestamp(ts)) > 86400 }}
        sequence:
          - service: input_datetime.set_datetime
            target:
              entity_id: !input low_export_since
            data:
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      # Clear low-export stamp once export recovers, so dwell restarts cleanly next dip.
      - conditions:
          - "{{ has_low_export_ts }}"
          - "{{ export_w >= export_threshold }}"
          - >
            {% set ts = states(low_export_since) %}
            {{ not (ts in ['unknown','unavailable','none',''] or ts is none) }}
        sequence:
          # Push it far in the past — effectively "no current low-export run".
          - service: input_datetime.set_datetime
            target:
              entity_id: !input low_export_since
            data:
              datetime: "1970-01-01 00:00:00"

      # ---------- PAUSE ----------
      - conditions:
          - "{{ is_running }}"
          - "{{ in_pause_window }}"
          - "{{ export_w < export_threshold }}"
          - "{{ pause_dwell_ok }}"
          - "{{ remaining_minutes > min_remaining_minutes }}"
          - "{{ remaining_minutes <= max_remaining_minutes }}"
          - "{{ not paused_by_us }}"
          - "{{ not skip_pause }}"
        sequence:
          # Only flip the "we paused this" flag when we actually act on the appliance.
          - choose:
              - conditions: "{{ pause_mode != 'notify_only' }}"
                sequence:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: !input paused_flag
                  - choose:
                      - conditions: "{{ has_pause_ts }}"
                        sequence:
                          - service: input_datetime.set_datetime
                            target:
                              entity_id: !input pause_timestamp
                            data:
                              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                  # Seed last_keepalive at pause time so the first
                  # keepalive fires `keepalive_interval_hours` later, not
                  # on the very next tick.
                  - choose:
                      - conditions: "{{ keepalive_enabled and has_last_keepalive }}"
                        sequence:
                          - service: input_datetime.set_datetime
                            target:
                              entity_id: !input last_keepalive
                            data:
                              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          - choose:
              - conditions: "{{ pause_mode == 'select_option' and has_op_select }}"
                sequence:
                  - service: select.select_option
                    target:
                      entity_id: "{{ operation_select }}"
                    data:
                      option: "{{ pause_option }}"
              - conditions: "{{ pause_mode == 'switch_off' and has_power_switch }}"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: "{{ power_switch }}"
          - choose:
              - conditions: "{{ has_notify }}"
                sequence:
                  - service: "{{ notify_service }}"
                    data:
                      title: "Solar pause"
                      message: >
                        {% if pause_mode == 'notify_only' -%}
                        Consider pausing {{ appliance_friendly_name }} —
                        {%- else -%}
                        Paused {{ appliance_friendly_name }} —
                        {%- endif %}
                        {{ remaining_minutes | int }} min left
                        (~{{ cycle_energy_kwh | round(2) }} kWh),
                        export {{ export_w | int }} W,
                        {{ minutes_to_sunset | int }} min to sunset.
                        Will resume
                        {%- if resume_strategy == 'auto_export' %} when solar returns
                        {%- elif resume_strategy == 'fixed_time' %} at
                          {{ states(resume_time) if has_resume_time else 'configured time' }}
                        {%- else %} when you press resume{%- endif %}.

      # ---------- RESUME (auto_export) ----------
      - conditions:
          - "{{ paused_by_us }}"
          - "{{ is_paused }}"
          - "{{ resume_strategy == 'auto_export' }}"
          - "{{ past_earliest_resume_hour }}"
          - "{{ past_min_pause }}"
          - "{{ not resumed_today }}"
          - "{{ export_w >= export_threshold }}"
          - "{{ hours_since_pause * 60 >= resume_dwell }}"
        sequence:
          - choose:
              - conditions: "{{ pause_mode == 'select_option' and has_op_select }}"
                sequence:
                  - service: select.select_option
                    target:
                      entity_id: "{{ operation_select }}"
                    data:
                      option: "{{ resume_option }}"
              - conditions: "{{ pause_mode == 'switch_off' and has_power_switch }}"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: "{{ power_switch }}"
          - service: input_boolean.turn_off
            target:
              entity_id: !input paused_flag
          - choose:
              - conditions: "{{ has_last_resume }}"
                sequence:
                  - service: input_datetime.set_datetime
                    target:
                      entity_id: !input last_resume_date
                    data:
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          - choose:
              - conditions: "{{ has_notify }}"
                sequence:
                  - service: "{{ notify_service }}"
                    data:
                      title: "Solar resume"
                      message: >
                        Resumed {{ appliance_friendly_name }} (export {{ export_w | int }} W).

      # ---------- RESUME (fixed_time) ----------
      - conditions:
          - "{{ paused_by_us }}"
          - "{{ is_paused }}"
          - "{{ resume_strategy == 'fixed_time' }}"
          - "{{ has_resume_time }}"
          - "{{ past_earliest_resume_hour }}"
          - "{{ past_min_pause }}"
          - "{{ not resumed_today }}"
          - >
            {% set rt = states(resume_time) %}
            {% if rt in ['unknown','unavailable','none',''] or rt is none %}
              false
            {% else %}
              {{ now() >= today_at(rt) }}
            {% endif %}
        sequence:
          - choose:
              - conditions: "{{ pause_mode == 'select_option' and has_op_select }}"
                sequence:
                  - service: select.select_option
                    target:
                      entity_id: "{{ operation_select }}"
                    data:
                      option: "{{ resume_option }}"
              - conditions: "{{ pause_mode == 'switch_off' and has_power_switch }}"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: "{{ power_switch }}"
          - service: input_boolean.turn_off
            target:
              entity_id: !input paused_flag
          - choose:
              - conditions: "{{ has_last_resume }}"
                sequence:
                  - service: input_datetime.set_datetime
                    target:
                      entity_id: !input last_resume_date
                    data:
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          - choose:
              - conditions: "{{ has_notify }}"
                sequence:
                  - service: "{{ notify_service }}"
                    data:
                      title: "Solar resume"
                      message: "Resumed {{ appliance_friendly_name }} on schedule."

      # ---------- KEEPALIVE (defer LG auto-power-off) ----------
      # Send `wake_up` (configurable) to the operation select periodically
      # while the appliance is paused-by-us, to reset its idle timeout.
      # Strict guardrails: only with select_option mode, only while still
      # in a paused state, only before earliest_resume_hour, and only when
      # the configured interval has elapsed since the previous keepalive.
      - conditions:
          - "{{ paused_by_us }}"
          - "{{ is_paused }}"
          - "{{ keepalive_due }}"
        sequence:
          - service: select.select_option
            target:
              entity_id: "{{ operation_select }}"
            data:
              option: "{{ keepalive_option }}"
          - service: input_datetime.set_datetime
            target:
              entity_id: !input last_keepalive
            data:
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      # ---------- TIMEOUT DETECTED (cycle lost) ----------
      # We paused it, but status is now in `timeout_states` — appliance
      # auto-powered-off and the program is gone. Notify the user so
      # they can restart it manually, and clear our flag.
      - conditions:
          - "{{ paused_by_us }}"
          - "{{ is_timed_out }}"
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: !input paused_flag
          - choose:
              - conditions: "{{ has_notify }}"
                sequence:
                  - service: "{{ notify_service }}"
                    data:
                      title: "Solar pause: cycle lost"
                      message: >
                        {{ appliance_friendly_name }} powered off while
                        paused (status: {{ status_raw }}). The cycle was
                        not auto-resumed — please restart it manually.

      # ---------- CLEAR FLAG if user manually resumed / cycle ended ----------
      - conditions:
          - "{{ paused_by_us }}"
          - "{{ not is_paused }}"
          - "{{ not is_running }}"
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: !input paused_flag
